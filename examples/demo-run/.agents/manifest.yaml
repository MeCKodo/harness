spec: ai-harness/v0

identity:
  name: demo-service
  summary: TODO one-line description of what this repo is
  scope_in: []
  scope_out: []
  upstream: []
  downstream: []

capabilities:
  setup:  { run: "pnpm install" }
  build:  { run: "pnpm build" }
  test:   { run: "pnpm test" }
  lint:   { run: "pnpm lint" }
  verify: { run: "harness-kit verify" }

environment: []

contracts: []

invariants:
  - id: no-console-log
    rule: No stray console.log left in source
    enforcement:
      forbid_pattern: ["console\\.log\\("]
      path_glob: ["src/**"]
  - id: no-hardcoded-secret
    rule: Do not hardcode secrets / tokens in source
    enforcement:
      forbid_pattern: ["(password|secret|token)\\s*[:=]\\s*[\"'][^\"']+[\"']"]
      path_glob: ["src/**"]

knowledge:
  - path: knowledge/domain.md
    role: domain
  - path: knowledge/conventions.md
    role: conventions
  - path: knowledge/journal/
    role: journal

modules:
  - name: core
    role: 示例核心逻辑
    entry: ["src/good.ts"]
    owns: ["src/**"]              # 把改动映射到本模块
    tests: ["test/**"]           # 覆盖本模块的测试
    checks: ["test"]             # 变更时跑的 capability 动词
    test_touch: required          # 核心逻辑必须同步补/改测试
    playbook: verify-core.md     # 如何验收本模块改动

validation:
  policies:
    test_touch_default: advisory
  required_coverage: ["src/**"]
  defaults:
    no_match: ["test"]           # 改动没命中任何 owns 时兜底跑

playbooks:
  dir: playbooks/
